services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trueke
      POSTGRES_USER: trueke
      POSTGRES_PASSWORD: trueke
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trueke']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build: ./api
    volumes:
      - ./api:/app
    ports:
      - '3000:3000'
    env_file:
      - path: ./api/.env
        required: false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build: ./web
    volumes:
      - ./web:/app
    ports:
      - '5173:5173'
    env_file:
      - path: ./web/.env
        required: false

volumes:
  postgres_data:
